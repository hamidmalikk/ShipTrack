async function sbFetch(method, table, body, match) {
  var url = SUPABASE_URL + "/rest/v1/" + table;
  if(match) {
    url += "?" + Object.keys(match).map(function(k){ return k + "=eq." + encodeURIComponent(match[k]); }).join("&");
  } else if(method === "GET") {
    url += "?select=*";
  }
  var headers = {
    "apikey": SUPABASE_KEY,
    "Authorization": "Bearer " + SUPABASE_KEY,
    "Content-Type": "application/json",
    "Accept": "application/json",
  };
  if(method === "POST" && !match) headers["Prefer"] = "resolution=merge-duplicates,return=representation";
  if(method === "PATCH") headers["Prefer"] = "return=representation";

  var opts = { method: method, headers: headers };
  if(body) opts.body = JSON.stringify(body);
  var resp = await fetch(url, opts);
  var text = await resp.text();
  if(!text || text === "") return method === "GET" ? [] : {};
  try { return JSON.parse(text); } catch(e) { return []; }
}

var SB = {
  select: function(table, match) { return sbFetch("GET", table + (match ? "?" + Object.keys(match).map(function(k){return k+"=eq."+encodeURIComponent(match[k]);}).join("&") : "?select=*"), null, null); },
  upsert: function(table, rows)  { return sbFetch("POST",  table, Array.isArray(rows)?rows:[rows], null); },
  update: function(table, data, match) { return sbFetch("PATCH", table, data, match); },
  insert: function(table, row)   { return sbFetch("POST",  table, row, null); },
};

function nowStr() { return new Date().toISOString(); }
function todayStr() { return new Date().toISOString().slice(0,10); }
function daysBetween(a,b) { return (a&&b) ? Math.round((new Date(b)-new Date(a))/86400000) : null; }
function isDelayed(s) { return s.status==="Delayed"||(s.eta&&s.actualArrival&&new Date(s.actualArrival)>new Date(s.eta)); }
function isOnTime(s) { return s.status==="Delivered"&&s.actualArrival&&s.eta&&new Date(s.actualArrival)<=new Date(s.eta); }
function getWeekRange() {
  var now = new Date("2026-06-09");
  var day = now.getDay();
  var mon = new Date(now); mon.setDate(now.getDate()-(day===0?6:day-1));
  var sun = new Date(mon); sun.setDate(mon.getDate()+6);
  return [mon.toISOString().slice(0,10), sun.toISOString().slice(0,10)];
}

function stepIdx(r) {
  if(r.requestStatus==="Pending"||r.requestStatus==="Rejected") return 0;
  if(!r.poCreatedAt) return 1;
  if(!r.dispatchedAt) return 2;
  if(r.status==="In Transit"||r.status==="Delayed") return 4;
  if(r.status==="Customs Clearance") return 5;
  if(r.status==="Delivered") return 6;
  return 3;
}

function canUserApproveRecord(user, record) {
  if(!user || !user.canApprove) return false;
  if(user.canViewAll) return record.requestStatus === "Pending";
  return record.requestStatus === "Pending" && record.company === user.company;
}

function canUserCreate(user) { return user && user.canCreate; }

function userSeesRecord(user, record) {
  if(!user) return false;
  if(user.canViewAll) return true;
  if(user.company === "All") return true;
  return record.company === user.company || record.department === user.role;
}

];

var TEMPLATE_CSV = "Brand,Business,Company,Origin,Destination,Mode,Budget,Currency,Items,Weight(MT),ETA(YYYY-MM-DD),Vessel/Flight,Department,Notes\n"+
"Zara,Fashion Retail,Al Futtaim Group,China,UAE,Sea,145000,AED,2400,8.2,2026-08-15,MSC DIANA,Replenishment,Summer collection\n"+
"Samsung,Electronics,GMG Group,South Korea,Saudi Arabia,Air,320000,SAR,300,0.9,2026-07-20,Emirates SkyCargo,Operations,Q3 electronics\n";

function parseCSV(text) {
  var lines = text.trim().split(/\r?\n/);
  if(lines.length < 2) return {error:"File must have a header row and at least one data row."};
  var headers = lines[0].split(",").map(function(h){return h.trim().toLowerCase().replace(/[^a-z0-9]/g,"");});
  var rows = [];
  var errors = [];
  for(var i=1;i<lines.length;i++){
    var line = lines[i];
    if(!line.trim()) continue;
    // Handle quoted fields
    var cols = [];
    var cur = ""; var inQ = false;
    for(var c=0;c<line.length;c++){
      var ch = line[c];
      if(ch==='"'){inQ=!inQ;}
      else if(ch===","&&!inQ){cols.push(cur.trim());cur="";}
      else{cur+=ch;}
    }
    cols.push(cur.trim());

    var row = {};
    // Map columns flexibly by matching header names
    var colMap = {
      brand:        ["brand"],
      business:     ["business","businesssegment","segment"],
      company:      ["company"],
      origin:       ["origin","origincountry","from"],
      destination:  ["destination","dest","to","destinationcountry"],
      mode:         ["mode","shippingmode","shipmode","type"],
      budgetAmount: ["budget","budgetamount","amount","budgetaed","budgetsar"],
      currency:     ["currency","curr","ccy"],
      items:        ["items","noofitems","qty","quantity","units"],
      weight:       ["weight","weightmt","wt"],
      eta:          ["eta","expectedeta","expecteddelivery","deliverydate"],
      vessel:       ["vessel","vesselname","flight","carrier","vesselrflight"],
      department:   ["department","dept","requestedby"],
      notes:        ["notes","note","description","remarks"],
    };
    Object.keys(colMap).forEach(function(field){
      var aliases = colMap[field];
      aliases.forEach(function(alias){
        var hi = headers.indexOf(alias);
        if(hi!==-1 && cols[hi]!==undefined && !row[field]){
          row[field] = cols[hi];
        }
      });
    });

    // Validate required
    var rowErrs = [];
    if(!row.brand)        rowErrs.push("Brand missing");
    if(!row.budgetAmount) rowErrs.push("Budget missing");
    if(!row.origin)       rowErrs.push("Origin missing");
    if(!row.destination)  rowErrs.push("Destination missing");

    // Normalise mode
    if(row.mode){
      var m = row.mode.toLowerCase();
      row.mode = (m.indexOf("air")!==-1) ? "Air" : "Sea";
    } else { row.mode = "Sea"; }

    // Normalise budget
    row.budgetAmount = parseFloat((row.budgetAmount||"0").replace(/[^0-9.]/g,""))||0;
    row.items = parseInt((row.items||"0").replace(/[^0-9]/g,""))||0;

    if(rowErrs.length>0){
      errors.push("Row "+(i)+": "+rowErrs.join(", "));
    } else {
      row._rowNum = i;
      rows.push(row);
    }
  }
  return {rows:rows, errors:errors};
}

function parseTSV(text){
  return parseCSV(text.replace(/\t/g,","));
}

function ImportModal(props){

    setFileName(name||"pasted text");
    var r = parseCSV(text);
    if(r.error){ setResult({error:r.error}); return; }
    setResult(r);
  }

  function handleFile(e){
    var file = e.target.files[0];

                    </thead>
                    <tbody>
                      {result.rows.slice(0,8).map(function(r,i){

                            <td style={{padding:"5px 6px", color:T.textSub, whiteSpace:"nowrap"}}>{(r.company||"-").split(" ")[0]}</td>
                            <td style={{padding:"5px 6px", color:T.textSub}}>{r.origin||"-"}</td>
                            <td style={{padding:"5px 6px", color:T.textSub}}>{r.destination||"-"}</td>
                            <td style={{padding:"5px 6px", color:r.mode==="Air"?T.accent:T.purple}}>{r.mode}</td>

                </div>

                  {"Review and Import "+result.rows.length+" Shipments"}
                </button>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

              <div style={{display:"flex", alignItems:"flex-start", gap:10}}>
                <div style={{width:20, height:20, borderRadius:5, border:"2px solid "+(isChecked?T.accent:T.border), background:isChecked?T.accent:"transparent", flexShrink:0, marginTop:1, display:"flex", alignItems:"center", justifyContent:"center"}}>

                </div>

                      <div style={{fontSize:10, color:T.textMuted}}>{(r.company||"")+" - "+(r.business||"")}</div>

                      <div style={{fontSize:12, fontWeight:700, color:T.gold}}>{(r.currency||"AED")+" "+fmtNum(r.budgetAmount)}</div>
                      <div style={{fontSize:9, color:r.mode==="Air"?T.accent:T.purple}}>{r.mode+" Freight"}</div>
                    </div>
                  </div>
                  <div style={{display:"flex", gap:8, marginTop:5, flexWrap:"wrap", fontSize:9, color:T.textSub}}>
                    <span>{(r.origin||"?")+" to "+(r.destination||"?")}</span>
                    {r.items>0 && <span>{r.items+" units"}</span>}
                    {r.eta && <span>{"ETA "+r.eta}</span>}

      </div>

}

// -- KPI DASHBOARD --
function KPIDashboard(props) {
  var allData=props.data; var period=props.period; var customFrom=props.customFrom; var customTo=props.customTo; var currentUser=props.currentUser;
  var from,to;
  if(period==="weekly"){var wr=getWeekRange();from=wr[0];to=wr[1];}
  else if(period==="monthly"){var mr=getMonthRange();from=mr[0];to=mr[1];}
  else{from=customFrom;to=customTo;}

  var periodData = (period==="custom"&&(!customFrom||!customTo)) ? allData : allData.filter(function(d){return inRange(d.createdAt,from,to);});
  var myData = periodData.filter(function(d){return userSeesRecord(currentUser,d);});
  var shipments = myData.filter(function(d){return d.type==="shipment"||d.requestStatus==="Approved";});
  var delivered = shipments.filter(function(d){return d.status==="Delivered";});
  var onTimeSh  = delivered.filter(isOnTime);
  var delayedList = shipments.filter(isDelayed);
  var inTransit = shipments.filter(function(d){return d.status==="In Transit";});
  var pending   = myData.filter(function(d){return d.requestStatus==="Pending";});
  var totalBudget = shipments.reduce(function(a,s){return a+s.budgetAmount;},0);
  var totalActual = delivered.reduce(function(a,s){return a+(s.actualCost||0);},0);
  var onTimePct = delivered.length>0?Math.round((onTimeSh.length/delivered.length)*100):0;

  var budgetChart = BUSINESSES.map(function(b){
    var rows = shipments.filter(function(s){return s.business===b;});
    return {name:b.split(" ")[0], budget:rows.reduce(function(a,s){return a+s.budgetAmount;},0), actual:rows.filter(function(s){return s.actualCost;}).reduce(function(a,s){return a+(s.actualCost||0);},0)};
  }).filter(function(b){return b.budget>0;});

  var monthlyPerf = [1,2,3,4,5,6].map(function(m){
    var mo=(m<10?"0":"")+m;
    var prefix="2026-"+mo;
    var mDel = allData.filter(function(s){return s.status==="Delivered"&&s.actualArrival&&s.actualArrival.indexOf(prefix)===0;});
    var mLate = allData.filter(function(s){return isDelayed(s)&&((s.eta&&s.eta.indexOf(prefix)===0)||(s.dispatchedAt&&s.dispatchedAt.indexOf(prefix)===0));});
    return {month:["Jan","Feb","Mar","Apr","May","Jun"][m-1], onTime:mDel.filter(isOnTime).length, delayed:mLate.length};
  });

  var reasonMap={};
  myData.filter(function(d){return d.delayReason;}).forEach(function(d){reasonMap[d.delayReason]=(reasonMap[d.delayReason]||0)+1;});
  var reasonPie=Object.keys(reasonMap).map(function(k){return {name:k,value:reasonMap[k]};});
  var PIE_COLORS=[T.red,T.orange,T.gold,T.purple,T.accent,T.green];
  var airCount=shipments.filter(function(s){return s.mode==="Air";}).length;
  var seaCount=shipments.filter(function(s){return s.mode==="Sea";}).length;
  var TS={background:T.card,border:"1px solid "+T.border,borderRadius:8,fontSize:11,color:T.text};
  var periodLabel=period==="weekly"?("Week of "+fmtDate(from)):period==="monthly"?"June 2026":"Custom Range";
  var onTimeColor=onTimePct>=80?T.green:onTimePct>=60?T.gold:T.red;
  var budgetColor=totalActual>totalBudget?T.red:T.green;
  var utilPct=totalBudget>0?Math.min(100,Math.round((totalActual/totalBudget)*100)):0;

  return (
    <div style={{padding:"12px 16px 80px"}}>
      <div style={{fontSize:10, color:T.textMuted, marginBottom:10, textAlign:"center"}}>
        {"Showing: "}<span style={{color:T.accent,fontWeight:700}}>{periodLabel}</span>{" - "+myData.length+" records"}
      </div>
      <div style={{display:"flex", gap:8, marginBottom:10}}>
        <Stat label="On-Time Rate" value={onTimePct+"%"} sub={onTimeSh.length+"/"+delivered.length+" delivered"} color={onTimeColor} />
        <Stat label="Delayed" value={delayedList.length} sub="Active delays" color={T.red} />
      </div>
      <div style={{display:"flex", gap:8, marginBottom:10}}>
        <Stat label="In Transit" value={inTransit.length} color={T.purple} />
        <Stat label="Pending" value={pending.length} color={T.gold} />
      </div>
      <div style={{background:T.card, borderRadius:12, padding:"11px 14px", marginBottom:12, border:"1px solid "+T.border}}>
        <div style={{display:"flex", justifyContent:"space-between", marginBottom:5}}>
          <span style={{fontSize:11, color:T.textMuted}}>Total Budget</span>
          <span style={{fontSize:13, fontWeight:800, color:T.gold}}>{"AED "+fmtNum(Math.round(totalBudget))}</span>
        </div>
        <div style={{display:"flex", justifyContent:"space-between"}}>
          <span style={{fontSize:11, color:T.textMuted}}>Actual Cost</span>
          <span style={{fontSize:13, fontWeight:800, color:budgetColor}}>{"AED "+fmtNum(Math.round(totalActual))}</span>
        </div>
        {totalActual>0 && (
          <div>
            <div style={{marginTop:6, height:6, background:T.border, borderRadius:99, overflow:"hidden"}}>
              <div style={{width:utilPct+"%", height:"100%", background:budgetColor, borderRadius:99}}></div>
            </div>
            <div style={{fontSize:9, color:T.textMuted, marginTop:2}}>{utilPct+"% of budget utilised"}</div>
          </div>
        )}
      </div>
      <div style={{background:T.card, borderRadius:12, padding:"12px 14px", marginBottom:12, border:"1px solid "+T.border}}>
        <SecTitle>On-Time vs Delayed - Monthly</SecTitle>
        <ResponsiveContainer width="100%" height={155}>
          <BarChart data={monthlyPerf} margin={{top:4,right:4,left:-22,bottom:0}}>
            <CartesianGrid strokeDasharray="3 3" stroke={T.border} />
            <XAxis dataKey="month" tick={{fontSize:10,fill:T.textMuted}} />
            <YAxis tick={{fontSize:10,fill:T.textMuted}} />
            <Tooltip contentStyle={TS} />
            <Legend wrapperStyle={{fontSize:10}} />
            <Bar dataKey="onTime" name="On Time" fill={T.green} radius={[4,4,0,0]} />
            <Bar dataKey="delayed" name="Delayed" fill={T.red} radius={[4,4,0,0]} />
          </BarChart>
        </ResponsiveContainer>
      </div>
      {budgetChart.length>0 && (
        <div style={{background:T.card, borderRadius:12, padding:"12px 14px", marginBottom:12, border:"1px solid "+T.border}}>
          <SecTitle>Budget vs Actual by Business</SecTitle>
          <ResponsiveContainer width="100%" height={155}>
            <BarChart data={budgetChart} margin={{top:4,right:4,left:-14,bottom:0}}>
              <CartesianGrid strokeDasharray="3 3" stroke={T.border} />
              <XAxis dataKey="name" tick={{fontSize:9,fill:T.textMuted}} />
              <YAxis tick={{fontSize:9,fill:T.textMuted}} tickFormatter={function(v){return v>=1000?(Math.round(v/1000)+"k"):""+v;}} />
              <Tooltip contentStyle={TS} formatter={function(v){return "AED "+fmtNum(v);}} />
              <Legend wrapperStyle={{fontSize:10}} />
              <Bar dataKey="budget" name="Budget" fill={T.gold} radius={[4,4,0,0]} />
              <Bar dataKey="actual" name="Actual" fill={T.accent} radius={[4,4,0,0]} />
            </BarChart>
          </ResponsiveContainer>
        </div>
      )}
      {reasonPie.length>0 && (
        <div style={{background:T.card, borderRadius:12, padding:"12px 14px", marginBottom:12, border:"1px solid "+T.border}}>
          <SecTitle>Delay Reasons</SecTitle>
          <div style={{display:"flex", gap:12, alignItems:"center"}}>
            <ResponsiveContainer width="45%" height={120}>
              <PieChart>
                <Pie data={reasonPie} cx="50%" cy="50%" innerRadius={28} outerRadius={50} dataKey="value" paddingAngle={3}>
                  {reasonPie.map(function(entry,i){return <Cell key={i} fill={PIE_COLORS[i%PIE_COLORS.length]} />;})}</Pie>
                <Tooltip contentStyle={TS} />
              </PieChart>
            </ResponsiveContainer>
            <div style={{flex:1, display:"flex", flexDirection:"column", gap:5}}>
              {reasonPie.map(function(r,i){
                return (
                  <div key={r.name} style={{display:"flex", justifyContent:"space-between", alignItems:"center"}}>
                    <div style={{display:"flex", gap:5, alignItems:"center"}}>
                      <div style={{width:7, height:7, borderRadius:"50%", background:PIE_COLORS[i%PIE_COLORS.length]}}></div>
                      <span style={{fontSize:9, color:T.textSub}}>{r.name}</span>
                    </div>
                    <span style={{fontSize:10, fontWeight:700, color:T.text}}>{r.value}</span>
                  </div>
                );
              })}

  // Load shipments from Supabase
  async function loadFromSupabase() {
    try {
      var rows = await SB.select("shipments");
      if(Array.isArray(rows) && rows.length > 0) {
        var mapped = rows.map(function(r){
          return {
            id:r.id, type:r.type, business:r.business, company:r.company,
            brand:r.brand, origin:r.origin, destination:r.destination,
            mode:r.mode, status:r.status, requestStatus:r.request_status,
            department:r.department, createdBy:r.created_by,
            budgetAmount:parseFloat(r.budget_amount)||0,
            actualCost:r.actual_cost?parseFloat(r.actual_cost):null,
            currency:r.currency, eta:r.eta, actualArrival:r.actual_arrival,
            createdAt:r.created_at, poCreatedAt:r.po_created_at, dispatchedAt:r.dispatched_at,
            items:r.items||0, weight:r.weight, vessel:r.vessel, bl:r.bl,
            notes:r.notes, delayReason:r.delay_reason, lastUpdated:r.last_updated,
            approvalChain:r.approval_chain||[],
          };
        });
        setData(mapped);
        setSyncedAt(nowStr());
        setSyncMode("server");

      } else if(Array.isArray(rows) && rows.length === 0) {
        await saveAllToSupabase(SEED);
        setSyncMode("server");
        setDbReady(true);
        return true;
      } else if(rows && rows.message) {
        console.log("Supabase error:", rows.message);
        setSyncMode("local");
      }
    } catch(e) {
      console.log("Supabase fetch failed:", e.message);
      setSyncMode("local");
    }
    return false;
  }

  // Load users from Supabase
  async function loadUsersFromSupabase() {
    try {
      var rows = await SB.select("app_users");
      if(Array.isArray(rows) && rows.length > 0) {
        setUsers(rows.map(function(r){
          return {
            id:r.id, username:r.username, password:r.password,
            name:r.name, role:r.role, company:r.company,
            canCreate:r.can_create, canApprove:r.can_approve,
            canViewAll:r.can_view_all, isActive:r.is_active,
          };
        }));
      }
    } catch(e) {}
  }

  async function saveAllToSupabase(records) {
    try {
      var rows = records.map(toDbRow);
      await SB.upsert("shipments", rows);
    } catch(e) {}
  }

  async function saveOneToSupabase(r) {
    try { await SB.upsert("shipments", [toDbRow(r)]); } catch(e) {}
  }

  function toDbRow(r) {
    return {
      id:r.id, type:r.type, business:r.business, company:r.company,
      brand:r.brand, origin:r.origin, destination:r.destination,
      mode:r.mode, status:r.status, request_status:r.requestStatus,
      department:r.department, created_by:r.createdBy,
      budget_amount:r.budgetAmount, actual_cost:r.actualCost||null,
      currency:r.currency, eta:r.eta||null, actual_arrival:r.actualArrival||null,
      created_at:r.createdAt, po_created_at:r.poCreatedAt||null,
      dispatched_at:r.dispatchedAt||null,
      items:r.items||0, weight:r.weight||"0",
      vessel:r.vessel||"TBD", bl:r.bl||"TBD",
      notes:r.notes||"", delay_reason:r.delayReason||null,
      last_updated:r.lastUpdated||nowStr(),
      approval_chain:r.approvalChain||[],
    };
  }

  // Initial load
  useEffect(function(){
    loadFromSupabase();
    loadUsersFromSupabase();
  }, []);

  // 30-second refresh
  useEffect(function(){
    var interval = setInterval(function(){
      setCountdown(function(c){
        if(c <= 1){
          loadFromSupabase();
          return 30;
        }
        return c - 1;
      });
    }, 1000);
    return function(){ clearInterval(interval); };
  }, []);

  function handleLogin(user) {
    setCurrentUser(user);
  }

  function handleLogout() {
    setCurrentUser(null);
    setView("list");
    setTab("dashboard");
    setSelected(null);
  }

  function handleApproveRecord(id, action, user, note) {
    var now = nowStr();
    setData(function(dd){
      var updated = dd.map(function(d){
        if(d.id!==id) return d;
        var entry = Object.assign({userId:user.id, by:user.name, at:now, role:user.role}, action==="reject"?{action:"Rejected",note:note}:{});
        var newD;
        if(action==="approve") {
          newD = Object.assign({},d,{requestStatus:"Approved",type:"shipment",status:"PO Created",approvalChain:d.approvalChain.concat([entry]),poCreatedAt:todayStr(),lastUpdated:now});
        } else {
          newD = Object.assign({},d,{requestStatus:"Rejected",status:"Rejected",approvalChain:d.approvalChain.concat([entry]),lastUpdated:now});
        }
        saveOneToSupabase(newD);
        return newD;
      });
      return updated;
    });
  }

  if(!currentUser) return <LoginScreen onLogin={handleLogin} />;

  var pendingCount = data.filter(function(d){return d.requestStatus==="Pending"&&userSeesRecord(currentUser,d);}).length;
  var myPendingApproval = data.filter(function(d){return canUserApproveRecord(currentUser,d);}).length;
  var delayedCount = data.filter(function(d){return isDelayed(d)&&userSeesRecord(currentUser,d);}).length;

  if(view==="detail"&&selected){
    var live = data.find(function(d){return d.id===selected.id;})||selected;
    return (
      <div style={{background:T.bg, minHeight:"100vh", fontFamily:"sans-serif", maxWidth:430, margin:"0 auto"}}>
        <SyncBar syncedAt={syncedAt} mode={syncMode} countdown={countdown} />
        <DetailView
          record={live}
          onBack={function(){setView("list");}}
          onApproveRecord={function(id,action,user,note){
            handleApproveRecord(id,action,user,note);
            setView("list");
            setTab("list");
          }}
          currentUser={currentUser}
        />
      </div>
    );
  }

  var TABS = [{k:"dashboard",label:"KPIs"},{k:"list",label:"All"},{k:"reports",label:"Reports"}].concat(currentUser.role==="Admin"?[{k:"users",label:"Users"}]:[]);

  return (
    <div style={{background:T.bg, minHeight:"100vh", fontFamily:"sans-serif", maxWidth:430, margin:"0 auto", position:"relative"}}>
      <SyncBar syncedAt={syncedAt} mode={syncMode} countdown={countdown} />

      <div style={{background:T.card, padding:"10px 16px 12px", borderBottom:"1px solid "+T.border, position:"sticky", top:22, zIndex:20}}>
        <div style={{display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:10}}>
          <div>
            <div style={{fontSize:18, fontWeight:900, color:T.text, letterSpacing:"-0.5px"}}>
              <span style={{color:T.accent}}>SHIP</span>{"TRACK"}
            </div>
            <div style={{display:"flex", alignItems:"center", gap:6, marginTop:2}}>
              <RoleBadge role={currentUser.role} />
              <span style={{fontSize:10, color:T.textSub}}>{currentUser.name}</span>
            </div>
          </div>
          <div style={{display:"flex", gap:5, alignItems:"center"}}>
            {myPendingApproval>0&&<span style={{background:T.goldDim, color:T.gold, fontSize:9, fontWeight:700, borderRadius:6, padding:"2px 7px", border:"1px solid "+T.gold+"44"}}>{myPendingApproval+" to approve"}</span>}
            {delayedCount>0&&<span style={{background:T.redDim, color:T.red, fontSize:9, fontWeight:700, borderRadius:6, padding:"2px 7px", border:"1px solid "+T.red+"44"}}>{delayedCount+" delayed"}</span>}
            {canUserCreate(currentUser)&&<button onClick={function(){setShowNew(true);}} style={{background:T.accent, border:"none", color:"#000", borderRadius:9, padding:"7px 10px", fontWeight:700, fontSize:11, cursor:"pointer"}}>+ New</button>}
            <button onClick={handleLogout} style={{background:T.border, border:"none", color:T.textMuted, borderRadius:9, padding:"7px 10px", fontWeight:600, fontSize:11, cursor:"pointer"}}>Out</button>
          </div>
        </div>

        {tab==="dashboard" && (
          <div>
            <div style={{display:"flex", gap:6, marginBottom:kpiPeriod==="custom"?8:0}}>
              {["weekly","monthly","custom"].map(function(p){
                return <button key={p} onClick={function(){setKpiPeriod(p);}} style={{background:kpiPeriod===p?T.accent:"transparent", color:kpiPeriod===p?"#000":T.textSub, border:"1px solid "+(kpiPeriod===p?T.accent:T.border), borderRadius:8, padding:"5px 12px", fontSize:11, fontWeight:kpiPeriod===p?700:400, cursor:"pointer"}}>{p.charAt(0).toUpperCase()+p.slice(1)}</button>;
              })}
            </div>
            {kpiPeriod==="custom" && (
              <div style={{display:"flex", gap:8, marginTop:6}}>
                <div style={{flex:1}}>
                  <label style={{fontSize:9, color:T.textMuted, display:"block", marginBottom:2}}>FROM</label>
                  <input type="date" value={customFrom} onChange={function(e){setCustomFrom(e.target.value);}} style={{width:"100%", background:T.surface, border:"1px solid "+T.accent+"44", color:T.text, borderRadius:8, padding:"6px 8px", fontSize:11, outline:"none", boxSizing:"border-box"}} />
                </div>
                <div style={{flex:1}}>
                  <label style={{fontSize:9, color:T.textMuted, display:"block", marginBottom:2}}>TO</label>
                  <input type="date" value={customTo} onChange={function(e){setCustomTo(e.target.value);}} style={{width:"100%", background:T.surface, border:"1px solid "+T.accent+"44", color:T.text, borderRadius:8, padding:"6px 8px", fontSize:11, outline:"none", boxSizing:"border-box"}} />
                </div>
              </div>
            )}
          </div>
        )}
      </div>

      <div>
        {tab==="dashboard"&&<KPIDashboard data={data} period={kpiPeriod} customFrom={customFrom} customTo={customTo} currentUser={currentUser} />}
        {tab==="list"&&<ShipmentList data={data} onSelect={function(r){setSelected(r);setView("detail");}} currentUser={currentUser} />}
        {tab==="reports"&&<ReportsView data={data} currentUser={currentUser} />}
        {tab==="users"&&currentUser.role==="Admin"&&<UsersView users={users} setUsers={setUsers} currentUser={currentUser} />}
      </div>

      <div style={{position:"fixed", bottom:0, left:"50%", transform:"translateX(-50%)", width:"100%", maxWidth:430, background:T.card, borderTop:"1px solid "+T.border, display:"flex", zIndex:30}}>
        {TABS.map(function(t){
          return (
            <button key={t.k} onClick={function(){setTab(t.k);}} style={{flex:1, background:"none", border:"none", color:tab===t.k?T.accent:T.textMuted, padding:"10px 0 14px", cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:2}}>
              <span style={{fontSize:13, fontWeight:tab===t.k?700:400}}>{t.label}</span>
              {tab===t.k&&<div style={{width:18, height:2, background:T.accent, borderRadius:99}}></div>}
            </button>
          );
        })}
      </div>

      {showNew&&canUserCreate(currentUser)&&(
        <NewRequestForm
          onSubmit={function(r){setData(function(dd){return [r].concat(dd);}); saveOneToSupabase(r);}}
          onBulkSubmit={function(records){setData(function(dd){return records.concat(dd);}); saveAllToSupabase(records);}}
          onClose={function(){setShowNew(false);}}
          currentUser={currentUser}
        />
      )}
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
