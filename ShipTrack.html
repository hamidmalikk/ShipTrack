<style>

body{background:radial-gradient(circle at 15% 0%,#0A1018 0%,#05070B 55%,#040508 100%);color:#E7EDF6;min-height:100vh;overflow-x:hidden;letter-spacing:0.005em}

.btn-green{background:linear-gradient(135deg,#34EFC0,#0FAE83);color:#012117;box-shadow:0 6px 18px -6px rgba(31,216,164,0.5)}
.btn-red{background:linear-gradient(135deg,#FF7892,#E5365B);color:#fff;box-shadow:0 6px 18px -6px rgba(255,92,122,0.45)}
.btn-border{background:transparent;border:1px solid var(--borderlt);color:var(--sub)}
.input{background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:9px;padding:10px 12px;font-size:13px;width:100%;outline:none;box-sizing:border-box;transition:border-color 0.15s}

.label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.09em;display:block;margin-bottom:4px;font-weight:600}

.badge{display:inline-block;font-size:10px;font-weight:700;border-radius:6px;padding:3px 9px;white-space:nowrap;letter-spacing:0.02em}

.syncbar{display:flex;align-items:center;justify-content:space-between;padding:6px 18px;border-bottom:1px solid rgba(34,195,230,0.18);background:rgba(34,195,230,0.06)}

.header{background:linear-gradient(180deg,#101820 0%,#0C121A 100%);padding:max(env(safe-area-inset-top,0px),24px) 20px 14px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:40}

.sec-title{font-size:10.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:12px;padding-bottom:7px;border-bottom:1px solid var(--border)}
.modal-overlay{position:fixed;inset:0;background:rgba(2,4,8,0.78);backdrop-filter:blur(3px);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;padding:22px 18px 40px;box-shadow:var(--shadow-pop);border:1px solid var(--border);border-bottom:none}
.hidden{display:none!important}
.flex{display:flex}.gap6{gap:6px}.gap8{gap:8px}.gap10{gap:10px}.wrap{flex-wrap:wrap}
.f1{flex:1}.f2{flex:2}
.mb10{margin-bottom:10px}.mb12{margin-bottom:12px}.mb14{margin-bottom:14px}
.spinner{display:inline-block;width:22px;height:22px;border:2.5px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.progress-bar{height:4px;background:var(--border);border-radius:99px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#0E96B8,#2BD4F2);border-radius:99px;transition:width 0.4s}
.toast{position:fixed;top:max(env(safe-area-inset-top,0px),20px);left:50%;transform:translateX(-50%);border-radius:11px;padding:11px 22px;font-weight:700;font-size:13px;z-index:999;white-space:nowrap;box-shadow:0 10px 30px -6px rgba(0,0,0,0.5);transition:opacity 0.3s}
.exec-stat{background:linear-gradient(165deg,var(--card2),var(--card));border:1px solid var(--border);border-radius:var(--r-md);padding:16px;box-shadow:var(--shadow-card);position:relative;overflow:hidden}
.exec-stat::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--accentline,var(--accent))}
.kpi-pill{display:inline-flex;align-items:center;gap:5px;background:var(--card);border:1px solid var(--border);border-radius:99px;padding:5px 13px;font-size:11px;font-weight:700;color:var(--sub);cursor:pointer;transition:all 0.15s}
.kpi-pill.active{background:linear-gradient(135deg,#2BD4F2,#0E96B8);color:#02151B;border-color:transparent;box-shadow:0 4px 14px -4px rgba(34,195,230,0.5)}
@media (min-width:880px){

  .card{padding:20px}
  .modal-overlay{align-items:center}
  .modal{border-radius:20px;max-height:88vh;padding:28px 28px 32px}
}
@media (max-width:879px){
  .desktop-tabs{display:none}
  .grid-2col{display:block}
}
</style>

var STATE={
  user:null,data:[],users:[],
  tab:"dashboard",view:"list",selected:null,

};

// ── UTILS ─────────────────────────────────────────────────────
function fmtNum(n){return n!=null?Number(n).toLocaleString():"—";}
function fmtDate(d){return d?new Date(d).toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"}):"—";}
function fmtTime(d){return d?new Date(d).toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"}):""; }
function nowStr(){return new Date().toISOString();}
function todayStr(){return new Date().toISOString().slice(0,10);}

var APP_TODAY=new Date("2026-06-15");
function getPeriodRange(p){
  var to=APP_TODAY.toISOString().slice(0,10);
  if(p==="weekly"){var d=new Date(APP_TODAY);d.setDate(d.getDate()-6);return{from:d.toISOString().slice(0,10),to:to};}
  if(p==="monthly"){var d2=new Date(APP_TODAY);d2.setDate(d2.getDate()-29);return{from:d2.toISOString().slice(0,10),to:to};}
  if(p==="yearly"){var d3=new Date(APP_TODAY);d3.setDate(d3.getDate()-364);return{from:d3.toISOString().slice(0,10),to:to};}
  return{from:STATE.customFrom,to:STATE.customTo};
}

function getStatusLabel(s){
  var m={"PO Created":"Awaiting Dispatch","Pending Approval":"Pending Approval","In Transit":"In Transit","Customs Clearance":"Customs Clearance","Delayed":"Delayed","Delivered":"Delivered","Rejected":"Rejected","At Warehouse":"At Warehouse","Logistics Review":"Logistics Review"};
  return m[s]||s;
}

function getNextSeq(type,brand,dept){
  // Auto-generate sequence number based on existing records of same type/brand/dept
  var prefix=type==="merchandise"?"M-"+(brand||"XX").replace(/\s+/g,"").toUpperCase().slice(0,4):((dept||"XX").replace(/\s+/g,"").toUpperCase().slice(0,6));
  var existing=STATE.data.filter(function(d){
    if(type==="merchandise") return d.type==="merchandise"&&(d.brand||"").replace(/\s+/g,"").toUpperCase().slice(0,4)===(brand||"").replace(/\s+/g,"").toUpperCase().slice(0,4);
    return d.type==="non_merchandise"&&(d.department||"").replace(/\s+/g,"").toUpperCase().slice(0,6)===(dept||"").replace(/\s+/g,"").toUpperCase().slice(0,6);
  });
  return String(existing.length+1).padStart(4,"0");
}
// Auto-generate next sequence number based on existing records
function nextSeqNum(){
  var nums=STATE.data.map(function(d){
    var n=parseInt((d.reqSeq||"0").toString().replace(/[^0-9]/g,""));
    return isNaN(n)?0:n;
  });
  var max=nums.length?Math.max.apply(null,nums):0;
  return String(max+1).padStart(4,"0");
}

function buildREQNumber(d){
  var seq=d.reqSeq||d.id.replace(/[^0-9]/g,"").slice(-4)||"0001";
  if(d.type==="merchandise"){
    var brand=(d.brand||"XX").replace(/\s+/g,"").toUpperCase().slice(0,4);
    var season=(d.season||"SS26").replace(/\s+/g,"");
    var yr=(d.createdAt||"2026").slice(0,4);
    return "REQ-M-"+brand+"-"+season+yr+"-"+seq;
  } else {
    var dept=(d.department||"XX").replace(/\s+/g,"").replace(/[^A-Za-z]/g,"").toUpperCase().slice(0,6);
    var vendor=(d.vendor||"VND").replace(/\s+/g,"").replace(/[^A-Za-z]/g,"").toUpperCase().slice(0,4)||"VND";
    return "REQ-"+dept+"-"+vendor+"-"+seq;
  }
}
function buildSHIPNumber(d){
  var seq=d.reqSeq||d.id.replace(/[^0-9]/g,"").slice(-4)||"0001";
  if(d.type==="merchandise"){
    var brand=(d.brand||"XX").replace(/\s+/g,"").toUpperCase().slice(0,4);
    var season=(d.season||"SS26").replace(/\s+/g,"");
    var yr=(d.createdAt||"2026").slice(0,4);
    return "SHIP-M-"+brand+"-"+season+yr+"-"+seq;
  } else {
    var dept=(d.department||"XX").replace(/\s+/g,"").replace(/[^A-Za-z]/g,"").toUpperCase().slice(0,6);
    var vendor=(d.vendor||"VND").replace(/\s+/g,"").replace(/[^A-Za-z]/g,"").toUpperCase().slice(0,4)||"VND";
    return "SHIP-"+dept+"-"+vendor+"-"+seq;
  }
}
function getDisplayId(d){
  if(!d) return "";
  // Pending = show REQ number
  if(d.requestStatus==="Pending"||d.type==="request"){
    if(d.type==="merchandise"||d.type==="non_merchandise") return buildREQNumber(d);
    return d.id;
  }
  // Approved = show SHIP number
  if(d.type==="merchandise"||d.type==="non_merchandise") return buildSHIPNumber(d);
  // Legacy records fallback
  var co=CO_CODES[d.business]||"XX";
  var ori=CC[d.origin]||((d.origin||"XX").slice(0,2).toUpperCase());
  var dst=CC[d.destination]||((d.destination||"XX").slice(0,2).toUpperCase());
  var yr=(d.createdAt||"2026").slice(0,4);
  var seq=d.id.replace(/[^0-9]/g,"").slice(-4);
  return (d.requestStatus==="Pending"?"REQ":"SHIP")+"-"+co+"-"+ori+dst+"-"+yr+"-"+seq;
}

function isDelayed(s){return s.status==="Delayed"||(s.eta&&s.actualArrival&&new Date(s.actualArrival)>new Date(s.eta));}
function isOnTime(s){return s.status==="Delivered"&&s.actualArrival&&s.eta&&new Date(s.actualArrival)<=new Date(s.eta);}
function stepIdx(r){
  if(r.requestStatus==="Pending"||r.requestStatus==="Rejected") return 0;
  if(r.status==="Pending Approval") return 1;
  if(r.status==="Awaiting Dispatch"||r.status==="PO Created") return 2;
  if(r.status==="In Transit"||r.status==="Delayed") return 4;
  if(r.status==="Customs Clearance") return 4;
  if(r.status==="At Warehouse") return 5;
  if(r.status==="Delivered") return 5;
  return 3;
}

function userSees(user,r){
  if(!user) return false;
  if(r.business!=="Fashion Retail"&&r.business!=="F & B") return false;
  if(user.role==="Admin") return true;
  if(user.canViewAll||user.company==="All") return true;
  return r.company===user.company;
}

function canApprove(user,r){
  if(!user) return false;
  if(user.role==="Admin") return r.requestStatus==="Pending";
  if(!user.canApprove) return false;
  if(user.canViewAll||user.company==="All") return r.requestStatus==="Pending";
  return r.requestStatus==="Pending"&&r.company===user.company;
}

function appendLog(record,action,details){
  return (record.editLog||[]).concat([{by:STATE.user?STATE.user.name:"System",role:STATE.user?STATE.user.role:"",at:nowStr(),action:action,details:details||""}]);
}

// ── DOM HELPERS ───────────────────────────────────────────────
function el(tag,attrs,children){
  var e=document.createElement(tag);
  if(attrs) Object.keys(attrs).forEach(function(k){
    if(k==="class"){e.className=attrs[k];}
    else if(k==="style"){if(typeof attrs[k]==="string") e.style.cssText=attrs[k];else Object.assign(e.style,attrs[k]);}
    else if(k.startsWith("on")){e.addEventListener(k.slice(2).toLowerCase(),attrs[k]);}
    else if(k==="html"){e.innerHTML=attrs[k];}
    else{try{e.setAttribute(k,attrs[k]);}catch(ex){}}
  });
  if(children!=null&&children!==false)[].concat(children).forEach(function(c){
    if(c==null||c===false) return;
    if(typeof c==="string"||typeof c==="number") e.appendChild(document.createTextNode(c));
    else e.appendChild(c);
  });
  return e;
}
function div(attrs,ch){return el("div",attrs,ch);}
function span(attrs,ch){return el("span",attrs,ch);}
function btn(attrs,ch){return el("button",attrs,ch);}
function inp(attrs){return el("input",attrs);}
function sel(attrs,opts){
  var s=el("select",attrs);
  opts.forEach(function(o){var op=document.createElement("option");op.value=o.value!=null?o.value:o;op.textContent=o.label!=null?o.label:o;s.appendChild(op);});
  return s;
}

// ── SUPABASE ──────────────────────────────────────────────────
async function sbFetch(method,table,body,qs){
  var url=SUPABASE_URL+"/rest/v1/"+table+(qs?"?"+qs:"?select=*");
  var headers={"apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY,"Content-Type":"application/json","Accept":"application/json"};
  if(method==="POST") headers["Prefer"]="resolution=merge-duplicates,return=representation";
  try{
    var r=await fetch(url,{method:method,headers:headers,body:body?JSON.stringify(body):undefined});
    var t=await r.text();
    if(!t) return method==="GET"?[]:{};
    return JSON.parse(t);
  }catch(e){return method==="GET"?[]:{error:e.message};}
}
